<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OMI POS SCGNN TinyNEAT Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:system-ui, sans-serif; margin:2rem; background:#101018; color:#eee}
    textarea{width:100%;min-height:9rem;background:#171722;color:#eee;border:1px solid #333;padding:1rem}
    button{margin:.75rem 0;padding:.55rem .9rem}
    pre{white-space:pre-wrap;background:#171722;border:1px solid #333;padding:1rem;overflow:auto}
  </style>
</head>
<body>
  <h1>OMI POS → SCGNN → JSON Canvas</h1>
  <textarea id="input">The chiral clock routes text into file blobs through graph links.</textarea>
  <br>
  <button id="compile">compile</button>
  <pre id="out"></pre>
  <script type="module">
    import { compileTextToPOSSCGNN } from "../src/index.js";
    const input = document.getElementById("input");
    const out = document.getElementById("out");
    function run() {
      const compiled = compileTextToPOSSCGNN(input.value);
      out.textContent = JSON.stringify(compiled.canvas, null, 2);
    }
    document.getElementById("compile").addEventListener("click", run);
    run();
  </script>
</body>
</html>
