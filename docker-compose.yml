services:
  omi-portal:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    labels:
      - "omi.service-bus=::1..::8"
      - "omi.context-root=omi-ffff-127-0-0-1"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
