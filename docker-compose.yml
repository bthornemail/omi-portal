services:
  # ============================================================
  # OMI Portal — production nginx runtime
  # ============================================================
  omi-portal:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: omi-portal
    restart: always
    ports:
      - "8080:80"
    labels:
      omi.context-root: "ffff-127--/48"
      omi.service-bus: "::1..::8"
      omi.memory-stride: "40320B"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================================
  # OMI QEMU SoftMMU — full-system emulation matrix
  # ============================================================
  qemu-emulators:
    build:
      context: .
      dockerfile: Dockerfile.softmmu
      target: softmmu-runtime
    container_name: omi-qemu-matrix
    profiles:
      - qemu
    restart: "no"
    security_opt:
      - apparmor:unconfined
    devices:
      - "/dev/kvm:/dev/kvm"
    volumes:
      - /tmp/omi-bus:/tmp/omi-bus

volumes:
  omi-bus:
    driver: local
