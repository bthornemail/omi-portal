services:
  omi-kernel-node:
    build:
      context: .
      dockerfile: Dockerfile.softmmu
      target: runtime
    container_name: omi-core-gateway
    restart: always
    volumes:
      - shared-bus:/tmp/omi-bus
    ports:
      - "8080:80"
    labels:
      omi.context-root: "omi-ffff-127-0-0-1"
      omi.memory-stride: "40320B"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  qemu-system-emulators:
    build:
      context: .
      dockerfile: Dockerfile.softmmu
      target: emulator
    container_name: omi-qemu-matrix
    restart: on-failure
    depends_on:
      - omi-kernel-node
    security_opt:
      - apparmor:unconfined
    devices:
      - "/dev/kvm:/dev/kvm"
    volumes:
      - shared-bus:/tmp/omi-bus

volumes:
  shared-bus:
    driver: local
