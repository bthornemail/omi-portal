<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omi Protocol: Symmetrical Chiral Translation Surface</title>
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-magenta: #ff0055;
            --neon-amber: #ffff00;
            --bg-dark: #07080b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Courier New', monospace;
            padding: 30px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.5rem;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        [data-omi-type="chiral-vertex"] {
            fill: rgba(0, 255, 204, 0.05);
            stroke: var(--neon-cyan);
            stroke-width: 1.2px;
            transform-box: fill-box;
            transform-origin: center;
            transform-style: preserve-3d;
            transition: transform 0.12s cubic-bezier(0.1, 0.8, 0.2, 1), fill 0.1s linear;
        }

        [id*="-0x02-left-"] {
            stroke: var(--neon-amber);
            fill: rgba(255, 255, 0, 0.03);
        }

        [id*="-0x04-right-"] {
            stroke: var(--neon-magenta);
            filter: drop-shadow(0 0 8px rgba(255, 0, 85, 0.5));
        }

        .chiral-inverted {
            stroke-dasharray: 4;
            animation: pulseInversion 0.2s infinite linear;
        }

        [id*="-??-"]:not([id*="-??-??-"]) {
            stroke-width: 2px;
            stroke: var(--neon-amber);
        }

        [id*="-??-??-"]:not([id*="-??-??-??-"]) {
            stroke-width: 2.5px;
            fill: rgba(0, 255, 204, 0.15);
        }

        [id*="-??-??-??-"] {
            stroke-width: 3px;
            stroke: var(--neon-magenta);
            filter: drop-shadow(0 20px 10px rgba(255, 0, 85, 0.4));
        }

        @keyframes pulseInversion {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 8; }
        }

        #omi-telemetry-panel {
            margin-top: 20px;
            background: rgba(0, 255, 204, 0.02);
            border: 1px solid rgba(0, 255, 204, 0.1);
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .metric-highlight { color: #fff; font-weight: bold; }

        #stream-log {
            margin-top: 16px;
            background: rgba(0, 255, 204, 0.02);
            border: 1px solid rgba(0, 255, 204, 0.1);
            border-radius: 6px;
            padding: 10px;
            font: 11px/1.4 'Courier New', monospace;
            max-height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--neon-cyan);
        }
        #stream-log .reset { color: var(--neon-magenta); }
        #stream-log .vector { color: #60a5fa; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .dot.connected { background: #22c55e; }
        .dot.disconnected { background: #ef4444; }
    </style>
</head>
<body>

    <h1>OMI NOTATION STREAM PROJECTION SURFACE</h1>

    <svg id="omi-ffff-127-0-0-1" width="100%" height="320" style="border: 1px solid rgba(0,255,204,0.05);">
        <g id="omi-hardware-io-matrix">
            <circle id="omi-ffff-127-0-0-1-0x02-left-NOUN-VERB-slot720-YmFzZTY0-imo"
                    data-omi-type="chiral-vertex" cx="150" cy="160" r="25" />

            <rect id="omi-ffff-127-0-0-1-0x04-right-PROPN-AUX-slot1440-??--MzkAQA-imo"
                  data-omi-type="chiral-vertex" x="450" y="110" width="100" height="100" />

            <polygon id="omi-ffff-127-0-0-1-0x02-left-ADJ-NUM-slot2160-??-??-??--ZzkAQA-imo"
                     data-omi-type="chiral-vertex" points="800,110 850,210 750,210" />
        </g>
    </svg>

    <div id="omi-telemetry-panel">
        <div>[Bus Connection]: <span id="telemetry-connection" class="metric-highlight">Initializing Stream...</span></div>
        <div>[Active Context]: <span id="telemetry-context" class="metric-highlight">omi-ffff-127-0-0-1</span></div>
        <div>[Last Ingested Token]: <span id="telemetry-token" class="metric-highlight">None</span></div>
        <div>[Calculated Polynomial Order]: <span id="telemetry-degree" class="metric-highlight">Degree 0 (Constant)</span></div>
        <div style="margin-top:8px">
            <span class="dot disconnected" id="stream-dot"></span>
            <span id="stream-label" style="color:var(--neon-cyan)">disconnected</span>
        </div>
    </div>

    <pre id="stream-log"></pre>

    <script type="module">
        import { OmiSymmetricalChiralLexer } from "../src/omi/chiral-lexer.js";
        import { OmiTrigraphPreprocessor } from "../src/omi/trigraph-preprocessor.js";
        import { OmiPlaceValueInterpreter } from "../src/omi/place-value-interpreter.js";

        const connectionIndicator = document.getElementById('telemetry-connection');
        const tokenDisplay = document.getElementById('telemetry-token');
        const degreeDisplay = document.getElementById('telemetry-degree');
        const streamDot = document.getElementById('stream-dot');
        const streamLabel = document.getElementById('stream-label');
        const streamLog = document.getElementById('stream-log');

        function logStream(origin, event, data) {
            const cls = event === "hard-reset" ? "reset" : "vector";
            const time = new Date().toLocaleTimeString();
            streamLog.innerHTML += `<span class="${cls}">[${time}] <strong>${origin}</strong> <em>${event}</em> ${JSON.stringify(data)}</span>\n`;
            streamLog.scrollTop = streamLog.scrollHeight;
        }

        const virtualSab = new SharedArrayBuffer(5040 * 8);
        const lexer = new OmiSymmetricalChiralLexer();
        const preprocessor = new OmiTrigraphPreprocessor(virtualSab);
        const interpreter = new OmiPlaceValueInterpreter(virtualSab);

        const STREAM_URLS = [
            "http://69.48.202.32:8080/omi-stream",
            "http://74.208.190.29:8080/omi-stream"
        ];

        function connectSSE(url) {
            const source = new EventSource(url);
            const origin = new URL(url).hostname;

            source.onopen = () => {
                connectionIndicator.textContent = `ONLINE (Bound to ${origin}:8080/omi-stream)`;
                connectionIndicator.style.color = "var(--neon-cyan)";
                streamDot.className = "dot connected";
                streamLabel.textContent = `connected to ${origin}`;
                logStream(origin, "open", {});
            };

            source.onerror = () => {
                connectionIndicator.textContent = `OFFLINE (Re-route loop active)`;
                connectionIndicator.style.color = "var(--neon-magenta)";
                streamDot.className = "dot disconnected";
                streamLabel.textContent = `disconnected from ${origin}`;
                logStream(origin, "error", {});
            };

            source.addEventListener('vector-update', (event) => {
                try {
                    const packetData = JSON.parse(event.data);
                    if (!packetData || !packetData.token) return;

                    const targetTokenStr = packetData.token;
                    tokenDisplay.textContent = targetTokenStr;

                    const preprocessorCell = preprocessor.preprocessAndEvaluateStream(targetTokenStr);
                    const headerMetadata = preprocessor.car(preprocessorCell);

                    const maskCell = interpreter.evaluateMaskDegree(targetTokenStr);
                    const degreeSpecs = interpreter.car(maskCell);

                    degreeDisplay.textContent = `Degree ${degreeSpecs.algebraicMetric.polynomialOrderDegree} (${degreeSpecs.algebraicMetric.activeMaskTerm})`;

                    logStream(origin, "vector-update", {
                        token: targetTokenStr.substring(0, 48) + "...",
                        degree: degreeSpecs.algebraicMetric.polynomialOrderDegree,
                        inverted: headerMetadata.hasTrigraphOperator
                    });

                    const targetNode = document.getElementById(targetTokenStr);
                    if (targetNode) {
                        if (headerMetadata.hasTrigraphOperator) {
                            targetNode.classList.add('chiral-inverted');
                        } else {
                            targetNode.classList.remove('chiral-inverted');
                        }

                        const zTranslationDepth = degreeSpecs.algebraicMetric.polynomialOrderDegree * 25;
                        targetNode.style.transform = `translate3d(0, 0, ${zTranslationDepth}px) rotateX(15deg)`;
                    }
                } catch (err) {
                    // transient frame parsing anomalies
                }
            });

            source.addEventListener('hard-reset', () => {
                console.log("[Omi UI View] Global 5040 clock ring loop reset detected. Resetting canvas layers.");
                logStream(origin, "hard-reset", {});
                const nodes = document.querySelectorAll('[data-omi-type="chiral-vertex"]');
                nodes.forEach(node => {
                    node.classList.remove('chiral-inverted');
                    node.style.transform = "translate3d(0px, 0px, 0px)";
                });
                degreeDisplay.textContent = "Degree 0 (Constant) - System Reset Completed";
            });
        }

        for (const url of STREAM_URLS) connectSSE(url);
    </script>
</body>
</html>
