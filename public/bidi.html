<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omi Protocol: OMI-CIDR-v0 128-Bit Projection Surface</title>
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-magenta: #ff0055;
            --neon-amber: #ffff00;
            --bg-dark: #07080b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Courier New', monospace;
            padding: 30px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.5rem;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        [data-omi-type="cidr-vertex"] {
            fill: rgba(0, 255, 204, 0.05);
            stroke: var(--neon-cyan);
            stroke-width: 1px;
            transform-box: fill-box;
            transform-origin: center;
            transform-style: preserve-3d;
            transition: transform 0.12s cubic-bezier(0.1, 0.8, 0.2, 1), fill 0.1s linear;
        }

        [data-omi-astronomy="sexagesimal-digit"] {
            stroke: var(--neon-cyan);
            stroke-dasharray: 2;
        }

        [id*="-slot720-"] {
            stroke: var(--neon-amber);
            stroke-width: 1.5px;
        }

        [id*="-slot120-"] {
            stroke: #ff8800;
            stroke-width: 1.5px;
        }

        [id$="/128"], [id*="/128-"] {
            stroke-width: 2px;
        }

        [id*="-step15"] {
            transform: translateZ(40px) rotateX(15deg) rotateY(-15deg);
            fill: rgba(0, 255, 204, 0.2);
        }

        [id*="-step59"] {
            stroke: var(--neon-magenta);
            filter: drop-shadow(0 0 10px #ff0055);
        }

        .chiral-inverted {
            stroke-dasharray: 4;
            animation: pulseInversion 0.2s infinite linear;
        }

        @keyframes pulseInversion {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 8; }
        }

        #omi-telemetry-panel {
            margin-top: 20px;
            background: rgba(0, 255, 204, 0.02);
            border: 1px solid rgba(0, 255, 204, 0.1);
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .metric-highlight { color: #fff; font-weight: bold; }

        #stream-log {
            margin-top: 16px;
            background: rgba(0, 255, 204, 0.02);
            border: 1px solid rgba(0, 255, 204, 0.1);
            border-radius: 6px;
            padding: 10px;
            font: 11px/1.4 'Courier New', monospace;
            max-height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--neon-cyan);
        }
        #stream-log .reset { color: var(--neon-magenta); }
        #stream-log .vector { color: #60a5fa; }
        #stream-log .sexagesimal { color: #ff8800; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .dot.connected { background: #22c55e; }
        .dot.disconnected { background: #ef4444; }
    </style>
</head>
<body>

    <h1>OMI-CIDR-v0 128-BIT PROJECTION SURFACE</h1>

    <svg id="Ο-ffff-127--/48" data-omi-subnet="::/48" width="100%" height="420" style="border:1px solid rgba(0,255,204,0.05);">
        <g data-omi-space="hellenistic-sexagesimal-matrix">

            <g data-omi-scope="global-root">
                <circle id="Ο--/0"
                        data-omi-type="cidr-vertex"
                        cx="100" cy="210" r="16" />
            </g>

            <g data-omi-scope="sexagesimal-stride720">
                <g id="Ο-ffff-127-0-0-1-0x02-slot720-step15/128"
                   data-omi-astronomy="sexagesimal-digit"
                   data-omi-stride="720" data-omi-step="15">
                    <circle id="Ο-ffff-127-0-0-1-0x02-slot720-step15/128-YmFzZTY0"
                            data-omi-type="cidr-vertex"
                            cx="280" cy="210" r="22" />
                </g>
            </g>

            <g data-omi-scope="sexagesimal-stride120">
                <g id="Ο-ffff-127-0-0-1-0x04-slot120-step59/128"
                   data-omi-astronomy="sexagesimal-digit"
                   data-omi-stride="120" data-omi-step="59">
                    <rect id="Ο-ffff-127-0-0-1-0x04-slot120-step59/128-MzkAQA"
                          data-omi-type="cidr-vertex"
                          x="440" y="160" width="80" height="80" />
                </g>
            </g>

            <g data-omi-scope="sexagesimal-stride5040">
                <g id="Ο-ffff-127-0-0-1-0x01-slot5040-step0/128"
                   data-omi-astronomy="sexagesimal-digit"
                   data-omi-stride="5040" data-omi-step="0">
                    <circle id="Ο-ffff-127-0-0-1-0x01-slot5040-step0/128"
                            data-omi-type="cidr-vertex"
                            cx="650" cy="210" r="16" />
                </g>
            </g>

        </g>
    </svg>

    <div id="omi-telemetry-panel">
        <div>[Bus Connection]: <span id="telemetry-connection" class="metric-highlight">Initializing Stream...</span></div>
        <div>[Operator]: <span id="telemetry-operator" class="metric-highlight">—</span></div>
        <div>[Codepoint]: <span id="telemetry-codepoint" class="metric-highlight">—</span></div>
        <div>[Last Ingested Token]: <span id="telemetry-token" class="metric-highlight">None</span></div>
        <div>[Polynomial Order]: <span id="telemetry-degree" class="metric-highlight">Degree 0 (Constant)</span></div>
        <div>[Sexagesimal Stride]: <span id="telemetry-stride" class="metric-highlight">—</span></div>
        <div>[Sexagesimal Step]: <span id="telemetry-step" class="metric-highlight">—</span></div>
        <div>[Fractional Ratio]: <span id="telemetry-ratio" class="metric-highlight">—</span></div>
        <div style="margin-top:8px">
            <span class="dot disconnected" id="stream-dot"></span>
            <span id="stream-label" style="color:var(--neon-cyan)">disconnected</span>
        </div>
    </div>

    <pre id="stream-log"></pre>

    <script type="module">
        import { OmiOmicronKernel } from "../src/omi/omicron-kernel.js";
        import { OmiSexagesimalKernel } from "../src/omi/sexagesimal-kernel.js";

        const connectionIndicator = document.getElementById('telemetry-connection');
        const operatorDisplay = document.getElementById('telemetry-operator');
        const codepointDisplay = document.getElementById('telemetry-codepoint');
        const tokenDisplay = document.getElementById('telemetry-token');
        const degreeDisplay = document.getElementById('telemetry-degree');
        const strideDisplay = document.getElementById('telemetry-stride');
        const stepDisplay = document.getElementById('telemetry-step');
        const ratioDisplay = document.getElementById('telemetry-ratio');
        const streamDot = document.getElementById('stream-dot');
        const streamLabel = document.getElementById('stream-label');
        const streamLog = document.getElementById('stream-log');

        function logStream(origin, event, data, cssClass) {
            const cls = cssClass || (event === "hard-reset" ? "reset" : "vector");
            const time = new Date().toLocaleTimeString();
            streamLog.innerHTML += `<span class="${cls}">[${time}] <strong>${origin}</strong> <em>${event}</em> ${JSON.stringify(data)}</span>\n`;
            streamLog.scrollTop = streamLog.scrollHeight;
        }

        const virtualSab = new SharedArrayBuffer(5040 * 8);
        const kernel = new OmiOmicronKernel(virtualSab);
        const sexaKernel = new OmiSexagesimalKernel(virtualSab);

        const STREAM_URLS = [
            "http://69.48.202.32:8080/omi-stream",
            "http://74.208.190.29:8080/omi-stream"
        ];

        function processSexagesimalToken(tokenStr) {
            const sexaCell = sexaKernel.parseSexagesimalAddress(tokenStr);
            const sexaHeader = sexaKernel.car(sexaCell);
            if (sexaHeader.valid) {
                strideDisplay.textContent = sexaHeader.astronomy.currentStrideValue;
                stepDisplay.textContent = sexaHeader.astronomy.sexagesimalStepDigit;
                ratioDisplay.textContent = sexaHeader.astronomy.fractionalRatio.toFixed(4);
                logStream("sexagesimal", "stride", {
                    stride: sexaHeader.astronomy.currentStrideValue,
                    step: sexaHeader.astronomy.sexagesimalStepDigit,
                    ratio: sexaHeader.astronomy.fractionalRatio
                }, "sexagesimal");
            } else {
                strideDisplay.textContent = "—";
                stepDisplay.textContent = "—";
                ratioDisplay.textContent = "—";
            }
        }

        function connectSSE(url) {
            const source = new EventSource(url);
            const origin = new URL(url).hostname;

            source.onopen = () => {
                connectionIndicator.textContent = `ONLINE (Bound to ${origin}:8080/omi-stream)`;
                connectionIndicator.style.color = "var(--neon-cyan)";
                streamDot.className = "dot connected";
                streamLabel.textContent = `connected to ${origin}`;
                logStream(origin, "open", {});
            };

            source.onerror = () => {
                connectionIndicator.textContent = "OFFLINE (Re-route loop active)";
                connectionIndicator.style.color = "var(--neon-magenta)";
                streamDot.className = "dot disconnected";
                streamLabel.textContent = `disconnected from ${origin}`;
                logStream(origin, "error", {});
            };

            source.addEventListener('vector-update', (event) => {
                try {
                    const packetData = JSON.parse(event.data);
                    if (!packetData || !packetData.token) return;

                    const targetTokenStr = packetData.token;
                    tokenDisplay.textContent = targetTokenStr;

                    const cell = kernel.evaluateOmicronTape(targetTokenStr);
                    const header = kernel.car(cell);

                    if (header.valid) {
                        operatorDisplay.textContent = header.operator;
                        codepointDisplay.textContent = header.codepoint;
                        degreeDisplay.textContent = `Degree ${header.algebraic.polynomialOrderDegree} (${header.algebraic.isPhaseInverted ? "inverted" : "direct"})`;
                    }

                    processSexagesimalToken(targetTokenStr);

                    logStream(origin, "vector-update", {
                        token: targetTokenStr.substring(0, 48) + "...",
                        operator: header.operator,
                        codepoint: header.codepoint,
                        degree: header.algebraic.polynomialOrderDegree,
                        valid: header.valid
                    });

                    const targetNode = document.getElementById(targetTokenStr);
                    if (targetNode) {
                        if (header.algebraic.isPhaseInverted) {
                            targetNode.classList.add('chiral-inverted');
                        } else {
                            targetNode.classList.remove('chiral-inverted');
                        }
                        const zDepth = header.algebraic.polynomialOrderDegree * 25;
                        targetNode.style.transform = `translate3d(0, 0, ${zDepth}px) rotateX(15deg)`;
                    }
                } catch (err) {
                    // transient frame parsing anomalies
                }
            });

            source.addEventListener('hard-reset', () => {
                console.log("[Omi Kernel] Global 5040 clock ring loop reset detected.");
                logStream(origin, "hard-reset", {});
                const nodes = document.querySelectorAll('[data-omi-type="cidr-vertex"]');
                nodes.forEach(node => {
                    node.classList.remove('chiral-inverted');
                    node.style.transform = "translate3d(0px, 0px, 0px)";
                });
                degreeDisplay.textContent = "Degree 0 (Constant) — System Reset Completed";
                strideDisplay.textContent = "—";
                stepDisplay.textContent = "—";
                ratioDisplay.textContent = "—";
            });
        }

        for (const url of STREAM_URLS) connectSSE(url);
    </script>
</body>
</html>
